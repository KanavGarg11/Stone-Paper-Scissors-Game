<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Paper Scissors - Kanav</title>
    <link rel = "stylesheet" href = "style.css">
</head>
<body>
    <div class = "heading">
        Stone Paper Scissors
    </div>

    <div class = "moves">
        <button class = "stone move">

        </button>
        <button class = "paper move">
            
        </button>
        <button class = "scissors move">
            
        </button>
    </div>

    <div class = "control">
        <div class = "playerScore score">
            <p>Player Score</p>
            <p id = "plyScrText">0</p>
        </div>

        <div class="buttonsSec">
            <div class="buttons">
                <button class="startBtn button">
                    Play...
                </button>
                <button class="resetBtn button">
                    Reset Scores
                </button>
            </div>

            <p id = "btnText"></p>
        </div>

        <div class = "computerScore score">
            <p>Computer Score</p>
            <p id = "compScrText">0</p>
        </div>
    </div>

    <div class = "computerBox">
        <div class = "computer">

        </div>

        <div class = "compText">
            Computer's Choice
        </div>
    </div>

    <div class = "footer">
        Made By KANAV GARG
    </div>
    <script src = "script.js"></script>
</body>
</html>
